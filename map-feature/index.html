<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="ErbilEats — نەخشەی چێشتخانەکان و کافێکانی هەولێر. شوێنە باشەکان بدۆزەوە.">
  <meta name="theme-color" content="#1B4332">
  <title>ErbilEats — نەخشەی هەولێر</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet CSS — 100% Free, No API Key -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

  <!-- Map Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
</head>
<body>

  <!-- ─── HEADER ─────────────────────────────────────── -->
  <header class="map-header" id="map-header">
    <div class="header-inner">
      <a href="../index.html" class="header-logo" id="header-logo-link">
        <span class="logo-icon">🍽️</span>
        <span class="logo-text">ErbilEats</span>
      </a>
      <div class="header-center">
        <h1 class="header-title">نەخشەی چێشتخانەکان</h1>
        <p class="header-sub">٥ شوێنی هەڵبژێردراو لە هەولێر</p>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btn-list-toggle" title="نیشاندانی لیست" aria-label="Toggle list">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
        </button>
        <button class="btn-icon" id="btn-locate" title="شوێنی من" aria-label="My location">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── MAIN LAYOUT ──────────────────────────────────── -->
  <main class="map-layout" id="map-layout">

    <!-- Sidebar -->
    <aside class="venue-sidebar" id="venue-sidebar" aria-label="لیستی شوێنەکان">
      <div class="sidebar-header">
        <h2 class="sidebar-title">شوێنەکان</h2>
        <span class="sidebar-count" id="sidebar-count">٥ شوێن</span>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">هەموو</button>
        <button class="filter-btn" data-filter="Traditional Kurdish">کوردی</button>
        <button class="filter-btn" data-filter="Specialty Coffee">قاوە</button>
        <button class="filter-btn" data-filter="Shisha Lounge">شیشە</button>
        <button class="filter-btn" data-filter="Fine Dining">فاین داینینگ</button>
      </div>
      <ul class="venue-list" id="venue-list" role="list"></ul>
    </aside>

    <!-- Map -->
    <div class="map-container" id="map-container">
      <div id="google-map"></div>
      <div class="map-loading" id="map-loading">
        <div class="loading-spinner"></div>
        <p>نەخشە بارئەکرێت…</p>
      </div>
    </div>
  </main>

  <!-- ─── CUSTOM INFO CARD ─────────────────────────────── -->
  <div class="card-overlay" id="card-overlay" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="info-card" id="info-card">

      <button class="card-close" id="card-close" aria-label="داخستن">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>

      <div class="card-image-wrap">
        <img class="card-image" id="card-image" src="" alt="" loading="lazy">
        <div class="card-image-overlay"></div>
        <div class="card-badges">
          <span class="badge badge-open" id="card-open-badge">کراوەیە</span>
          <span class="badge badge-price" id="card-price-badge">$$</span>
        </div>
        <div class="card-category" id="card-category"></div>
      </div>

      <div class="card-body">
        <div class="card-name-row">
          <div>
            <h2 class="card-name-ku" id="card-name-ku"></h2>
            <p class="card-name-en" id="card-name-en"></p>
          </div>
        </div>

        <div class="card-rating-row">
          <div class="stars" id="card-stars"></div>
          <span class="rating-value" id="card-rating-value"></span>
          <span class="rating-count" id="card-rating-count"></span>
        </div>

        <div class="card-meta">
          <div class="meta-item">
            <svg class="meta-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="card-address"></span>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.36 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.69a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <a class="meta-link" id="card-phone" href="tel:"></a>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V8l9-6 9 6v14"/><path d="M9 22V12h6v10"/></svg>
            <span id="card-neighborhood"></span>
          </div>
        </div>

        <p class="card-desc" id="card-desc"></p>
        <div class="card-tags" id="card-tags"></div>

        <div class="card-actions">
          <a class="btn-primary-card" id="card-menu-btn" href="#" target="_self">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
            <span>بینینی مینیو و پێداچوونەوە</span>
          </a>
          <a class="btn-secondary-card" id="card-directions-btn" href="#" target="_blank" rel="noopener noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            <span>ئاراستە</span>
          </a>
          <button class="btn-icon-card" id="card-phone-btn" aria-label="پەیوەندی">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.36 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.69a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS — Free, No API Key Ever Needed -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="map.js"></script>
</body>
</html>
